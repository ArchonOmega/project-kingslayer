<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT KINGSLAYER — Target List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0b0d;
      --bg2:       #0f1114;
      --bg3:       #151820;
      --border:    #1e2330;
      --accent:    #c8a84b;
      --accent2:   #e8c86a;
      --red:       #c0392b;
      --green:     #27ae60;
      --orange:    #e67e22;
      --text:      #d4d8e2;
      --muted:     #555e72;
      --claimed:   #1a2e1a;
      --mono:      'Share Tech Mono', monospace;
      --display:   'Bebas Neue', sans-serif;
      --body:      'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-left { display: flex; flex-direction: column; gap: 0.2rem; }

    .header-eyebrow {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.05em;
      color: #fff;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .header-sub {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    .stats-bar {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      min-width: 60px;
    }

    .stat-num {
      font-family: var(--display);
      font-size: 2rem;
      line-height: 1;
      color: var(--accent2);
    }
    .stat-num.red  { color: var(--red); }
    .stat-num.green{ color: var(--green); }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .progress-wrap {
      padding: 0.75rem 2rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .controls {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    input[type="search"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }

    .filter-btns { display: flex; gap: 0.5rem; }

    .filter-btn {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 0.4rem 0.9rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

    .sort-select {
      font-family: var(--mono);
      font-size: 0.75rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.75rem;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .table-wrap { padding: 1.5rem 2rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead tr { border-bottom: 2px solid var(--accent); }

    th {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0.5rem 1rem 0.75rem;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover { color: var(--accent2); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }

    tbody tr:hover { background: var(--bg3); }

    tbody tr.is-claimed {
      background: var(--claimed);
      opacity: 0.6;
    }

    td { padding: 0.75rem 1rem; vertical-align: middle; }

    td.td-check { width: 44px; text-align: center; }

    .check-box {
      width: 20px;
      height: 20px;
      border: 2px solid var(--muted);
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .check-box.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .check-box svg { display: none; }
    .check-box.checked svg { display: block; }

    td.td-region { font-family: var(--mono); font-weight: 500; color: #fff; }
    tr.is-claimed td.td-region { text-decoration: line-through; color: var(--muted); }

    td.td-claimer { color: var(--muted); font-size: 0.78rem; }
    td.td-claimed-by { font-size: 0.75rem; font-family: var(--mono); color: var(--green); }

    td.td-date { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

    td.td-link a {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      transition: all 0.15s;
    }

    .priority {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      margin-left: 0.5rem;
    }

    .priority.high   { background: rgba(192,57,43,0.2);  color: #e74c3c; border: 1px solid rgba(192,57,43,0.4); }
    .priority.med    { background: rgba(230,126,34,0.2); color: #e67e22; border: 1px solid rgba(230,126,34,0.4); }

    .claimedby-input {
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--border);
      color: var(--green);
      font-family: var(--mono);
      font-size: 0.75rem;
      width: 130px;
      outline: none;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.75rem 1.25rem;
      border-radius: 4px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 1000;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    .row-count { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); padding: 0 2rem 0.5rem; }

    @media (max-width: 768px) {
      header { padding: 1rem; }
      td.td-claimer, td.td-date { display: none; }
    }
  </style>
</head>

// ── STATE ────────────────────────────────────────────────────
let TARGETS = []; // Now loaded from DB
let state = {};   // Claim status loaded from DB
let filter   = 'all';
let searchQ  = '';
let sortMode = 'date-asc';

async function loadData() {
  try {
    const res = await fetch('/api/targets');
    const data = await res.json();
    TARGETS = data.targets;
    state = data.state;
    renderTable();
  } catch (err) { console.error("Cloud load error:", err); }
}

async function saveState(newState) {
  state = newState;
  await fetch('/api/targets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'state', data: state })
  });
}

// ── HELPERS ──────────────────────────────────────────────────
function getEntry(region) {
  return state[region] || { claimed: false, claimedBy: '' };
}

async function setEntry(region, data) {
  const updatedState = { ...state, [region]: { ...getEntry(region), ...data } };
  await saveState(updatedState);
}

function updateStats() {
  const total     = TARGETS.length;
  const claimed   = Object.values(state).filter(e => e.claimed).length;
  const remaining = total - claimed;
  const pct       = total > 0 ? Math.round((claimed / total) * 100) : 0;

  document.getElementById('stat-total').textContent     = total;
  document.getElementById('stat-done').textContent      = claimed;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-text').textContent  = pct + '% complete';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getPriority(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const days = (now - d) / (1000 * 86400);
  if (days <= 3)  return 'high';
  if (days <= 7)  return 'med';
  return '';
}

function priorityLabel(p) {
  if (p === 'high') return '<span class="priority high">HOT</span>';
  if (p === 'med')  return '<span class="priority med">RECENT</span>';
  return '';
}

// ── RENDER ───────────────────────────────────────────────────
function getVisible() {
  let list = [...TARGETS];
  if (filter === 'pending') list = list.filter(t => !getEntry(t.region).claimed);
  if (filter === 'claimed') list = list.filter(t => getEntry(t.region).claimed);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(t => t.region.toLowerCase().includes(q) || (t.claimer || '').toLowerCase().includes(q));
  }
  list.sort((a, b) => {
    switch (sortMode) {
      case 'date-asc': return (a.timestamp||'').localeCompare(b.timestamp||'');
      case 'date-desc': return (b.timestamp||'').localeCompare(a.timestamp||'');
      case 'region-asc': return a.region.localeCompare(b.region);
      case 'region-desc': return b.region.localeCompare(a.region);
      case 'claimer-asc': return (a.claimer||'').localeCompare(b.claimer||'');
      default: return 0;
    }
  });
  return list;
}

function renderTable() {
  const visible = getVisible();
  const tbody   = document.getElementById('tbody');
  const empty   = document.getElementById('empty-state');
  const rc      = document.getElementById('row-count');

  tbody.innerHTML = '';
  if (!visible.length) {
    empty.style.display = 'block';
    rc.textContent = '';
    updateStats();
    return;
  }

  empty.style.display = 'none';
  rc.textContent = `Showing ${visible.length} of ${TARGETS.length} targets`;

  visible.forEach(t => {
    const entry    = getEntry(t.region);
    const claimed  = entry.claimed;
    const priority = claimed ? '' : getPriority(t.timestamp);
    const dateStr  = t.timestamp ? t.timestamp.slice(0, 10) : '—';

    const tr = document.createElement('tr');
    tr.className = claimed ? 'is-claimed' : '';
    tr.innerHTML = `
      <td class="td-check">
        <div class="check-box ${claimed ? 'checked' : ''}" data-region="${t.region}">
          <svg width="12" height="12" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </td>
      <td class="td-region">${t.region}${priorityLabel(priority)}</td>
      <td class="td-claimer">${t.claimer}</td>
      <td class="td-claimed-by">
        <input class="claimedby-input" type="text" value="${entry.claimedBy || ''}" data-region="${t.region}" ${!claimed ? 'disabled style="display:none"' : ''}>
      </td>
      <td class="td-date">${dateStr}</td>
      <td class="td-link"><a href="${t.slurl}" target="_blank">↗ TP</a></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.check-box').forEach(box => {
    box.addEventListener('click', async () => {
      const region = box.dataset.region;
      const nowClaimed = !getEntry(region).claimed;
      await setEntry(region, { claimed: nowClaimed });
      showToast(nowClaimed ? `✔ ${region} claimed` : `↩ ${region} unclaimed`);
      renderTable();
    });
  });

  tbody.querySelectorAll('.claimedby-input').forEach(inp => {
    inp.addEventListener('blur', async () => {
      await setEntry(inp.dataset.region, { claimedBy: inp.value });
    });
  });

  updateStats();
}

// ── CONTROLS ─────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    renderTable();
  });
});

document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value.trim(); renderTable(); });
document.getElementById('sort-select').addEventListener('change', e => { sortMode = e.target.value; renderTable(); });

// ── INIT ─────────────────────────────────────────────────────
loadData();
</script>
