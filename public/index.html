<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT KINGSLAYER</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0b0d;
      color: #d4d8e2;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 0.1em;
      color: #fff;
    }
    h1 span { color: #c8a84b; }
    p { color: #555e72; font-size: 0.85rem; letter-spacing: 0.2em; }
    .dot {
      width: 8px; height: 8px;
      background: #c8a84b;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      margin: 0 auto;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <h1>PROJECT <span>KINGSLAYER</span></h1>
  <p>SYSTEM INITIALIZING — STAND BY</p>
</body>
</html>
